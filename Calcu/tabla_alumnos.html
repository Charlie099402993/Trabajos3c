<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">

          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">

<body>
<main>
    <!-- El ID se mantiene como tablaAlumnos -->
    <table id="tablaAlumnos">
        <tr>
            <th>Nombre</th>
            <th>Edad</th>
            <th>Matricula</th>
            <th>Imagen perfil</th>
        </tr>
    </table>
    <button type="button" id="add">Agregar Alumno</button>
    <hr>
    <form action="#" method="post" id="Agregar_alumno">
  <label for="Nombre">Ingresa un Nombre</label>
    <input type="text" id="Nombre" name="Nombre"/>
    <br>
    <label for="edad">Ingresa una edad </label>
    <input type="number" id="edad" name="edad"/>
    <br>
    <label for="Matricula">Ingresa una Matricula</label>
    <input type="text" id="Matricula" name="Matricula"/>
        <br>
        <label for="Imagen">Ingresa una Imagen</label>
        <input type="text" id="Imagen" name="Imagen"/>
        <br>

        <button type="button" id="add_Alumno">Agregar nuevo alumno a la BD</button>

    </form>


</main>


<script src="js/tabla_alumnos.js"></script>
